name: mobile_stock_manager
description: "Premium Stock Management App for Mobile Phone Retail Shops"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # UI / Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  animations: ^2.0.11
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.3.1

  # Barcode / QR
  barcode_widget: ^2.0.4
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  image_picker: ^1.1.2
  local_auth: ^2.2.0
  flutter_secure_storage: ^9.2.2
  share_plus: ^9.0.0
  file_picker: ^8.0.3
  permission_handler: ^11.3.1

  # Reports / Export
  pdf: ^3.11.0
  printing: ^5.13.1
  excel: ^4.0.3
  csv: ^6.0.0

  # Notifications
  flutter_local_notifications: ^17.2.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
